[tox]
minversion = 3.28.0
envlist =
    lint
    py3-molecule-docker
    py3-molecule-podman

[testenv]
description = Run Molecule tests
skip_install = true
deps =
    molecule==25.1.0
    molecule-docker==2.1.0
    molecule-podman==2.0.0
    ansible==2.15.13
    docker>=6.0.0
    pytest==9.0.2
passenv =
    HOME
    SSH_AUTH_SOCK
    DOCKER_HOST
setenv =
    PYTHONUNBUFFERED=1
    ANSIBLE_CONFIG={toxinidir}/ansible.cfg
    MOLECULE_EPHEMERAL_DIRECTORY=/tmp/molecule
commands =
    molecule test -s docker

[testenv:lint]
description = Lint the role
deps =
    ansible-lint
    yamllint
commands =
    ansible-lint
    yamllint .

[testenv:py3-molecule-podman]
description = Run Molecule with Podman
deps =
    molecule==25.1.0
    molecule-podman==2.0.0
    ansible==2.15.13
    pytest==9.0.2
commands =
    molecule test -s podman