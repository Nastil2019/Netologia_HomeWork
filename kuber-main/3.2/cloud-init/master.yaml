#cloud-config
users:
  - name: yc-user
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ${ssh_public_key}

write_files:
  - content: |
      #!/bin/bash
      set -e
      
      # Отключаем swap
      swapoff -a
      sed -i '/ swap / s/^/#/' /etc/fstab
      
      # Загружаем необходимые модули ядра
      cat <<EOF | tee /etc/modules-load.d/containerd.conf
      overlay
      br_netfilter
      EOF
      
      modprobe overlay
      modprobe br_netfilter
      
      # Настраиваем sysctl для Kubernetes
      cat <<EOF | tee /etc/sysctl.d/kubernetes.conf
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
      EOF
      
      sysctl --system
      
      # Устанавливаем containerd
      apt-get update
      apt-get install -y curl gnupg lsb-release
      
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
      chmod a+r /etc/apt/keyrings/docker.asc
      
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      
      apt-get update
      apt-get install -y containerd.io
      
      # Настраиваем containerd
      mkdir -p /etc/containerd
      containerd config default | tee /etc/containerd/config.toml
      sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
      systemctl restart containerd
      systemctl enable containerd
      
      # Устанавливаем Kubernetes компоненты
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
      
      apt-get update
      apt-get install -y kubelet kubeadm kubectl
      apt-mark hold kubelet kubeadm kubectl
      
      # Инициализация кластера
      kubeadm init --pod-network-cidr=10.244.0.0/16 --upload-certs
      
      # Настройка kubectl для пользователя
      mkdir -p /home/yc-user/.kube
      cp -i /etc/kubernetes/admin.conf /home/yc-user/.kube/config
      chown yc-user:yc-user /home/yc-user/.kube/config
      
      # Устанавливаем Calico (CNI)
      su - yc-user -c "kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/calico.yaml"
      
      echo "Master node initialization complete!"
      echo "Join command saved to /root/join-command.sh"
    path: /root/init-master.sh
    permissions: '0755'

runcmd:
  - /root/init-master.sh > /var/log/init-master.log 2>&1